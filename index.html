<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>سماء النيران</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; height: 100%; overflow: hidden; touch-action: none; background: #0b1026; }
  canvas { display: block; position: fixed; inset: 0; }

  body, button, p, h1, h2, span {
    font-family: 'Courier New', 'Consolas', monospace;
    font-weight: 700;
  }

  #scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 50;
    background: repeating-linear-gradient(to bottom, rgba(255,255,255,.035) 0px, rgba(255,255,255,.035) 1px, transparent 2px, transparent 4px);
    mix-blend-mode: overlay;
  }
  #vignette { position: fixed; inset: 0; pointer-events: none; z-index: 49; box-shadow: inset 0 0 160px 60px rgba(0,0,0,.65); }

  #hud {
    position: fixed; top: 14px; left: 0; right: 0; display: flex; justify-content: space-between;
    padding: 0 16px; z-index: 60; pointer-events: none; color: #fff;
  }
  #score-box { font-size: clamp(14px,4vw,18px); color: #33eaff; text-shadow: 0 0 8px rgba(51,234,255,.7); letter-spacing: 1px; }
  #lives-box { display: flex; gap: 6px; font-size: 18px; }

  #start-screen, #gameover-screen {
    position: fixed; inset: 0; z-index: 70; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px; background: rgba(6,10,24,.92); color: #fff; text-align: center;
    padding: 24px;
  }
  .hidden { display: none !important; }
  #start-screen h1 { color: #33eaff; font-size: clamp(22px,7vw,34px); text-shadow: 0 0 14px rgba(51,234,255,.8); margin: 0; letter-spacing: 2px; }
  #gameover-screen h2 { color: #ff5577; font-size: clamp(20px,6vw,26px); text-shadow: 0 0 14px rgba(255,85,119,.8); margin: 0; letter-spacing: 1px; }
  #start-screen p, #gameover-screen p { font-size: 13px; line-height: 2; color: #a9c7ff; margin: 0; max-width: 290px; }
  .score-line { font-size: 15px; color: #ffd56b; }
  .arcade-btn {
    font-family: 'Courier New', monospace; font-weight: 700; font-size: 15px; color: #0b1026;
    background: linear-gradient(#5cf3ff, #1bb6d8); border: none; padding: 14px 26px; border-radius: 8px;
    box-shadow: 0 6px 0 #0c7a91, 0 10px 18px rgba(0,0,0,.4); cursor: pointer; letter-spacing: 1px;
  }
  .arcade-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #0c7a91; }
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="hud">
  <div id="score-box">النقاط: <span id="score-val">0</span></div>
  <div id="lives-box"></div>
</div>

<div id="start-screen">
  <h1>سماء النيران</h1>
  <p>اسحب بإصبعك يمين أو يسار لتحريك طائرتك — الإطلاق تلقائي.<br>تجنّب رصاص الأعداء وأسقطهم لتجمع النقاط!</p>
  <p class="score-line">أفضل نتيجة: <span id="start-best">0</span></p>
  <button class="arcade-btn" id="start-btn">ابدأ المعركة</button>
</div>

<div id="gameover-screen" class="hidden">
  <h2>سقطت طائرتك!</h2>
  <p class="score-line">نتيجتك: <span id="final-score">0</span></p>
  <p class="score-line">أفضل نتيجة: <span id="best-score">0</span></p>
  <button class="arcade-btn" id="restart-btn">العب مرة أخرى</button>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W = innerWidth, H = innerHeight;

  function resize(){
    W = innerWidth; H = innerHeight;
    const dpr = Math.min(devicePixelRatio || 1, 2);
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);

  // ---------- الصوت ----------
  function blip(freq, duration, type, vol){
    try{
      if(!blip.ctx) blip.ctx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx2 = blip.ctx;
      const osc = ctx2.createOscillator(); const gain = ctx2.createGain();
      osc.type = type || 'sine'; osc.frequency.value = freq;
      osc.connect(gain); gain.connect(ctx2.destination);
      gain.gain.setValueAtTime(vol || 0.1, ctx2.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + duration);
      osc.start(); osc.stop(ctx2.currentTime + duration);
    }catch(e){}
  }

  // ---------- التخزين (أفضل نتيجة) ----------
  async function loadHighScore(){
    try{
      if(!window.storage) return 0;
      const res = await window.storage.get('plane-shooter-highscore');
      return res ? (parseInt(res.value, 10) || 0) : 0;
    }catch(e){ return 0; }
  }
  async function saveHighScore(v){
    try{ if(window.storage) await window.storage.set('plane-shooter-highscore', String(v)); }catch(e){}
  }

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  // ---------- الحالة العامة ----------
  let state = 'start';
  let player, bullets, enemyBullets, enemies, particles, toasts, stars;
  let score = 0, bestScore = 0, lastLevelScore = 0;
  let spawnTimer = 0, spawnInterval = 1.1, elapsedTime = 0;
  let shakeTime = 0, shakeMag = 0;
  let targetX = W / 2;

  function initStars(){
    stars = [];
    for(let i = 0; i < 90; i++){
      const near = Math.random() > 0.6;
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        size: near ? 2 : 1,
        speed: near ? 90 + Math.random() * 60 : 40 + Math.random() * 30,
        alpha: near ? 0.7 + Math.random() * 0.3 : 0.35 + Math.random() * 0.3
      });
    }
  }

  function resetGame(){
    player = { x: W / 2, y: H - 110, w: 46, h: 54, lives: 3, invincible: false, invTimer: 0, fireTimer: 0 };
    bullets = []; enemyBullets = []; enemies = []; particles = []; toasts = [];
    score = 0; lastLevelScore = 0; spawnTimer = 0.6; spawnInterval = 1.1; elapsedTime = 0;
    shakeTime = 0; shakeMag = 0;
    targetX = W / 2;
    updateHUD();
  }

  function spawnEnemy(){
    const heavy = Math.random() < 0.18;
    const w = heavy ? 54 : 40, h = heavy ? 46 : 34;
    const x = 30 + Math.random() * (W - 60);
    enemies.push({
      x, y: -40, w, h,
      vy: (heavy ? 55 : 80) + Math.random() * 30 + Math.min(60, elapsedTime * 1.1),
      wigglePhase: Math.random() * Math.PI * 2,
      hp: heavy ? 3 : 1, maxHp: heavy ? 3 : 1,
      points: heavy ? 30 : 10,
      shootTimer: 0.6 + Math.random() * 1.2,
      shootInterval: 1.0 + Math.random() * 1.0,
      heavy
    });
  }

  function spawnExplosion(x, y, scale){
    for(let i = 0; i < 14; i++){
      const ang = Math.random() * Math.PI * 2, sp = 80 + Math.random() * 160;
      particles.push({
        x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        life: 0.5 + Math.random() * 0.4, size: (2 + Math.random() * 3) * scale,
        color: Math.random() < 0.5 ? '#ffb347' : '#ff5577'
      });
    }
  }
  function spawnSpark(x, y){
    for(let i = 0; i < 4; i++){
      const ang = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 80;
      particles.push({ x, y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp, life: 0.2 + Math.random() * 0.15, size: 1.5 + Math.random() * 1.5, color: '#9be8ff' });
    }
  }
  function showToast(text){ toasts.push({ text, life: 1.3 }); }

  function hitPlayer(){
    player.lives -= 1;
    player.invincible = true; player.invTimer = 1.4;
    shakeTime = 0.3; shakeMag = 10;
    spawnExplosion(player.x, player.y, 1.2);
    blip(110, 0.25, 'sawtooth', 0.15);
    updateHUD();
    if(player.lives <= 0) endGame();
  }

  function endGame(){
    state = 'gameover';
    if(score > bestScore){ bestScore = score; saveHighScore(bestScore); }
    document.getElementById('final-score').textContent = score;
    document.getElementById('best-score').textContent = bestScore;
    document.getElementById('gameover-screen').classList.remove('hidden');
    blip(160, 0.4, 'sawtooth', 0.18);
  }

  function updateHUD(){
    document.getElementById('score-val').textContent = score;
    const box = document.getElementById('lives-box');
    box.innerHTML = '';
    for(let i = 0; i < player.lives; i++){
      const s = document.createElement('span'); s.textContent = '✈️';
      box.appendChild(s);
    }
  }

  // ---------- التحديث ----------
  function update(dt){
    stars.forEach(s => { s.y += s.speed * dt; if(s.y > H){ s.y = -4; s.x = Math.random() * W; } });
    toasts.forEach(t => t.life -= dt);
    toasts = toasts.filter(t => t.life > 0);
    if(shakeTime > 0) shakeTime -= dt;

    if(state !== 'playing') return;

    elapsedTime += dt;
    spawnInterval = Math.max(0.42, 1.15 - elapsedTime * 0.01);
    spawnTimer -= dt;
    if(spawnTimer <= 0){ spawnEnemy(); spawnTimer = spawnInterval; }

    player.x += (targetX - player.x) * Math.min(1, dt * 9);
    player.x = clamp(player.x, player.w / 2 + 10, W - player.w / 2 - 10);

    if(player.invincible){ player.invTimer -= dt; if(player.invTimer <= 0) player.invincible = false; }

    player.fireTimer -= dt;
    if(player.fireTimer <= 0){
      bullets.push({ x: player.x - 10, y: player.y - 20, vy: -620 });
      bullets.push({ x: player.x + 10, y: player.y - 20, vy: -620 });
      player.fireTimer = 0.22;
      blip(880, 0.04, 'square', 0.045);
    }

    bullets.forEach(b => b.y += b.vy * dt);
    bullets = bullets.filter(b => b.y > -20);

    enemyBullets.forEach(b => b.y += b.vy * dt);
    enemyBullets = enemyBullets.filter(b => b.y < H + 20);

    enemies.forEach(e => {
      e.y += e.vy * dt;
      e.wigglePhase += dt * 2;
      e.x += Math.sin(e.wigglePhase) * 18 * dt;
      e.x = clamp(e.x, e.w / 2, W - e.w / 2);
      e.shootTimer -= dt;
      if(e.shootTimer <= 0 && e.y > 10 && e.y < H - 160){
        enemyBullets.push({ x: e.x, y: e.y + e.h / 2, vy: 300 + Math.min(140, elapsedTime * 1.4) });
        e.shootTimer = e.shootInterval;
        blip(220, 0.06, 'sawtooth', 0.035);
      }
    });
    enemies = enemies.filter(e => e.y < H + 60 && e.hp > 0);

    for(let i = bullets.length - 1; i >= 0; i--){
      const b = bullets[i];
      for(let j = enemies.length - 1; j >= 0; j--){
        const e = enemies[j];
        if(Math.abs(b.x - e.x) < e.w / 2 && Math.abs(b.y - e.y) < e.h / 2){
          bullets.splice(i, 1);
          e.hp -= 1;
          spawnSpark(b.x, b.y);
          if(e.hp <= 0){
            score += e.points;
            spawnExplosion(e.x, e.y, e.heavy ? 1.6 : 1);
            blip(140, 0.12, 'square', 0.08);
            if(score - lastLevelScore >= 150){ lastLevelScore = score; showToast('عمل رائع! استمر 🔥'); }
            updateHUD();
          }
          break;
        }
      }
    }

    if(!player.invincible){
      for(let i = enemyBullets.length - 1; i >= 0; i--){
        const b = enemyBullets[i];
        if(Math.abs(b.x - player.x) < player.w / 2 - 6 && Math.abs(b.y - player.y) < player.h / 2 - 6){
          enemyBullets.splice(i, 1);
          hitPlayer();
          break;
        }
      }
      for(let j = enemies.length - 1; j >= 0; j--){
        const e = enemies[j];
        if(Math.abs(e.x - player.x) < (e.w + player.w) / 2 - 10 && Math.abs(e.y - player.y) < (e.h + player.h) / 2 - 10){
          spawnExplosion(e.x, e.y, 1.3);
          enemies.splice(j, 1);
          hitPlayer();
          break;
        }
      }
    }

    particles.forEach(p => { p.x += p.vx * dt; p.y += p.vy * dt; p.vy += 40 * dt; p.life -= dt; });
    particles = particles.filter(p => p.life > 0);
  }

  // ---------- الرسم ----------
  function drawPlayerPlane(p){
    ctx.save();
    ctx.translate(p.x, p.y);
    const flameLen = 10 + Math.random() * 8;
    ctx.fillStyle = 'rgba(255,180,60,0.85)';
    ctx.beginPath();
    ctx.moveTo(-7, p.h / 2 - 4); ctx.lineTo(0, p.h / 2 - 4 + flameLen); ctx.lineTo(7, p.h / 2 - 4);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#2bd1f2';
    ctx.beginPath();
    ctx.moveTo(0, -p.h / 2);
    ctx.lineTo(p.w / 2, p.h / 2 - 6);
    ctx.lineTo(p.w / 4, p.h / 2);
    ctx.lineTo(-p.w / 4, p.h / 2);
    ctx.lineTo(-p.w / 2, p.h / 2 - 6);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#0c7a91';
    ctx.beginPath();
    ctx.moveTo(0, -4); ctx.lineTo(p.w / 2 - 4, p.h / 2 - 10); ctx.lineTo(p.w / 2 - 12, p.h / 2 - 2); ctx.lineTo(0, 8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -4); ctx.lineTo(-(p.w / 2 - 4), p.h / 2 - 10); ctx.lineTo(-(p.w / 2 - 12), p.h / 2 - 2); ctx.lineTo(0, 8);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#bdf3ff';
    ctx.beginPath(); ctx.ellipse(0, -6, 5, 9, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }

  function drawEnemyPlane(e){
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(Math.PI);
    const bodyColor = e.heavy ? '#c43cff' : '#ff5577';
    const wingColor = e.heavy ? '#7a1fb0' : '#a8233f';
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(0, -e.h / 2);
    ctx.lineTo(e.w / 2, e.h / 2 - 6);
    ctx.lineTo(e.w / 4, e.h / 2);
    ctx.lineTo(-e.w / 4, e.h / 2);
    ctx.lineTo(-e.w / 2, e.h / 2 - 6);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = wingColor;
    ctx.beginPath();
    ctx.moveTo(0, -4); ctx.lineTo(e.w / 2 - 4, e.h / 2 - 10); ctx.lineTo(e.w / 2 - 12, e.h / 2 - 2); ctx.lineTo(0, 8);
    ctx.closePath(); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0, -4); ctx.lineTo(-(e.w / 2 - 4), e.h / 2 - 10); ctx.lineTo(-(e.w / 2 - 12), e.h / 2 - 2); ctx.lineTo(0, 8);
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = '#ffd9e3';
    ctx.beginPath(); ctx.ellipse(0, -6, 4, 7, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();

    if(e.heavy){
      const barW = e.w * 0.8;
      ctx.fillStyle = 'rgba(255,255,255,0.25)'; ctx.fillRect(e.x - barW / 2, e.y - e.h / 2 - 10, barW, 4);
      ctx.fillStyle = '#ff5577'; ctx.fillRect(e.x - barW / 2, e.y - e.h / 2 - 10, barW * (e.hp / e.maxHp), 4);
    }
  }

  function draw(){
    ctx.clearRect(0, 0, W, H);
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#0b1026'); g.addColorStop(1, '#161c3d');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    stars.forEach(s => {
      ctx.globalAlpha = s.alpha;
      ctx.fillStyle = '#bfe7ff';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    });
    ctx.globalAlpha = 1;

    let sx = 0, sy = 0;
    if(shakeTime > 0){ sx = (Math.random() - 0.5) * shakeMag; sy = (Math.random() - 0.5) * shakeMag; }
    ctx.save();
    ctx.translate(sx, sy);

    ctx.shadowBlur = 8;
    enemyBullets.forEach(b => {
      ctx.fillStyle = '#ff5577'; ctx.shadowColor = '#ff5577';
      ctx.beginPath(); ctx.ellipse(b.x, b.y, 3.5, 9, 0, 0, Math.PI * 2); ctx.fill();
    });
    bullets.forEach(b => {
      ctx.fillStyle = '#9be8ff'; ctx.shadowColor = '#33eaff';
      ctx.beginPath(); ctx.ellipse(b.x, b.y, 3, 10, 0, 0, Math.PI * 2); ctx.fill();
    });
    ctx.shadowBlur = 0;

    enemies.forEach(e => drawEnemyPlane(e));

    particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life * 1.6);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    if(state === 'playing' && (!player.invincible || Math.floor(elapsedTime * 14) % 2 === 0)){
      drawPlayerPlane(player);
    }
    ctx.restore();

    if(toasts.length){
      ctx.textAlign = 'center';
      ctx.font = "bold 16px 'Courier New', monospace";
      toasts.forEach(t => {
        ctx.globalAlpha = Math.min(1, t.life);
        ctx.fillStyle = '#ffd56b';
        ctx.fillText(t.text, W / 2, H * 0.4);
      });
      ctx.globalAlpha = 1;
    }
  }

  // ---------- التحكم باللمس / الفأرة ----------
  function isUI(target){
    return target.closest && target.closest('#start-screen, #gameover-screen, button');
  }
  function handleTouch(e){
    if(isUI(e.target)) return; // اسمح للمس بالوصول للأزرار بشكل طبيعي
    if(e.cancelable) e.preventDefault();
    const t = e.touches && e.touches[0];
    if(t) targetX = t.clientX;
  }
  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove', handleTouch, { passive: false });
  window.addEventListener('mousemove', e => { if(!isUI(e.target)) targetX = e.clientX; });

  // ---------- أزرار البدء ----------
  function startGame(){
    document.getElementById('start-screen').classList.add('hidden');
    document.getElementById('gameover-screen').classList.add('hidden');
    resetGame();
    state = 'playing';
    blip(523, 0.12, 'square', 0.08);
  }
  function bindTap(el, fn){
    let fired = false;
    el.addEventListener('touchend', e => {
      e.preventDefault();
      fired = true;
      fn();
      setTimeout(() => { fired = false; }, 400);
    }, { passive: false });
    el.addEventListener('click', () => { if(!fired) fn(); });
  }
  bindTap(document.getElementById('start-btn'), startGame);
  bindTap(document.getElementById('restart-btn'), startGame);

  // ---------- حلقة اللعبة ----------
  let lastTime = 0;
  function loop(ts){
    requestAnimationFrame(loop);
    const dt = Math.min((ts - lastTime) / 1000, 0.05) || 0;
    lastTime = ts;
    update(dt);
    draw();
  }

  // ---------- التهيئة ----------
  resize();
  initStars();
  player = { x: W / 2, y: H - 110, w: 46, h: 54, lives: 3, invincible: false, invTimer: 0, fireTimer: 0 };
  bullets = []; enemyBullets = []; enemies = []; particles = []; toasts = [];
  loadHighScore().then(v => {
    bestScore = v;
    document.getElementById('start-best').textContent = bestScore;
  });
  requestAnimationFrame(loop);
})();
</script>
</body>
  </html>
