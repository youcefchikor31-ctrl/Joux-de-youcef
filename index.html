<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>سوبرمان: النسخة النهائية بالتصادم</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        .ui-container { position: absolute; bottom: 30px; display: flex; width: 100%; justify-content: space-between; padding: 0 20px; box-sizing: border-box; z-index: 100; pointer-events: none; }
        #left-ui { display: grid; grid-template-columns: repeat(3, 75px); gap: 12px; }
        #right-ui { display: flex; flex-direction: column-reverse; gap: 20px; }
        .btn { width: 75px; height: 75px; background: rgba(0, 0, 0, 0.7); border: 3px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 30px; pointer-events: auto; user-select: none; backdrop-filter: blur(5px); -webkit-tap-highlight-color: transparent; }
        .btn:active { background: #0088ff; transform: scale(0.9); }
        #up { grid-column: 2; } #left { grid-column: 1; grid-row: 2; } #down { grid-column: 2; grid-row: 2; } #right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

<div class="ui-container">
    <div id="left-ui">
        <div class="btn" id="up">🔼</div>
        <div class="btn" id="left">⬅️</div>
        <div class="btn" id="down">🔽</div>
        <div class="btn" id="right">➡️</div>
    </div>
    <div id="right-ui">
        <div class="btn" id="fly-toggle">⚡</div>
        <div class="btn" id="jump">🆙</div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, character, bodyGroup, leftLeg, rightLeg, leftArm, rightArm, cape;
    let isFlying = false, moveF = false, moveB = false, rotL = false, rotR = false;
    let velocityY = 0, gravity = 0.02, walkCycle = 0;
    const chunks = new Map();
    const chunkSize = 200;
    let cars = [], npcs = [], collidables = []; // مصفوفة للأشياء التي لا يمكن اختراقها

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 400);

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1500);
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        character = new THREE.Group();
        bodyGroup = new THREE.Group();
        character.add(bodyGroup);
        const suitMat = new THREE.MeshPhongMaterial({ color: 0x0000ff });
        const skinMat = new THREE.MeshPhongMaterial({ color: 0xffdbac });

        const torso = new THREE.Mesh(new THREE.CylinderGeometry(1, 0.7, 2.5, 10), suitMat);
        torso.position.y = 3.5; bodyGroup.add(torso);
        const head = new THREE.Group();
        const face = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.9, 0.8), skinMat);
        const hair = new THREE.Mesh(new THREE.BoxGeometry(0.85, 0.3, 0.85), new THREE.MeshPhongMaterial({color: 0x000000}));
        hair.position.y = 0.5; head.add(face, hair); head.position.y = 5.2; bodyGroup.add(head);

        leftLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.3, 2.5, 8), suitMat);
        leftLeg.position.set(-0.45, 1.25, 0); bodyGroup.add(leftLeg);
        rightLeg = leftLeg.clone(); rightLeg.position.x = 0.45; bodyGroup.add(rightLeg);

        leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.25, 2.2, 8), skinMat);
        leftArm.position.set(-1.1, 3.8, 0); bodyGroup.add(leftArm);
        rightArm = leftArm.clone(); rightArm.position.x = 1.1; bodyGroup.add(rightArm);

        cape = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 3.2), new THREE.MeshPhongMaterial({ color: 0xee0000, side: THREE.DoubleSide }));
        cape.position.set(0, 4.2, -0.8);
        bodyGroup.add(cape);

        scene.add(character);
        setupControls();
        animate();
    }

    function createCar(x, z) {
        const car = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(6.5, 2.8, 12), new THREE.MeshPhongMaterial({color: Math.random()*0xffffff}));
        body.position.y = 1.4; car.add(body);
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(5.5, 2, 6), new THREE.MeshPhongMaterial({color: 0x333333}));
        cabin.position.set(0, 3.5, -1); car.add(cabin);
        car.position.set(x, 0, z);
        car.userData = { speed: 0.6 + Math.random()*0.4 };
        collidables.push(body); // السيارة جسم صلب
        return car;
    }

    function createNPC(x, z) {
        const npc = new THREE.Group();
        const clothMat = new THREE.MeshPhongMaterial({color: Math.random()*0xffffff});
        const skinMat = new THREE.MeshPhongMaterial({color: 0xffdbac});
        const nTorso = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.5, 2.2, 8), clothMat);
        nTorso.position.y = 3.2; npc.add(nTorso);
        const nHead = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.8, 0.7), skinMat);
        nHead.position.y = 4.7; npc.add(nHead);
        npc.position.set(x, 0, z);
        npc.userData = { speed: 0.05 + Math.random()*0.05, dir: Math.random()>0.5?1:-1 };
        return npc;
    }

    function createChunk(x, z) {
        const chunk = new THREE.Group();
        chunk.position.set(x * chunkSize, 0, z * chunkSize);
        scene.add(chunk);

        const ground = new THREE.Mesh(new THREE.PlaneGeometry(chunkSize, chunkSize), new THREE.MeshPhongMaterial({color: 0x333333}));
        ground.rotation.x = -Math.PI / 2; chunk.add(ground);

        const road = new THREE.Mesh(new THREE.PlaneGeometry(50, chunkSize), new THREE.MeshPhongMaterial({color: 0x111111}));
        road.rotation.x = -Math.PI/2; road.position.y = 0.02; chunk.add(road);

        const side = new THREE.Mesh(new THREE.PlaneGeometry(15, chunkSize), new THREE.MeshPhongMaterial({color: 0x666666}));
        side.rotation.x = -Math.PI/2; side.position.set(-32, 0.05, 0); chunk.add(side);
        const sideR = side.clone(); sideR.position.x = 32; chunk.add(sideR);

        for(let i=0; i<4; i++) {
            const h = 40 + Math.random()*60;
            const b = new THREE.Mesh(new THREE.BoxGeometry(20, h, 20), new THREE.MeshPhongMaterial({color: 0xbbbbbb}));
            b.position.set(Math.random()>0.5?60:-60, h/2, (Math.random()-0.5)*chunkSize);
            chunk.add(b);
            collidables.push(b); // المبنى جسم صلب
        }
        for(let i=0; i<2; i++) {
            const car = createCar(Math.random()>0.5?12:-12, (Math.random()-0.5)*chunkSize);
            chunk.add(car); cars.push(car);
        }
        for(let i=0; i<4; i++) {
            const npc = createNPC(Math.random()>0.5?32:-32, (Math.random()-0.5)*chunkSize);
            chunk.add(npc); npcs.push(npc);
        }
        chunks.set(`${x},${z}`, chunk);
    }

    // دالة فحص التصادم
    function checkCollision(newPos) {
        const charBox = new THREE.Box3().setFromObject(bodyGroup);
        // تحديث مكان الصندوق التخيلي للمكان الجديد
        const offset = newPos.clone().sub(character.position);
        charBox.translate(offset);

        for (let obj of collidables) {
            const objBox = new THREE.Box3().setFromObject(obj);
            if (charBox.intersectsBox(objBox)) return true;
        }
        return false;
    }

    function animate() {
        requestAnimationFrame(animate);
        const cx = Math.round(character.position.x / chunkSize);
        const cz = Math.round(character.position.z / chunkSize);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) if(!chunks.has(`${cx+i},${cz+j}`)) createChunk(cx+i, cz+j);

        cars.forEach(c => { c.position.z += c.userData.speed; if(c.position.z > chunkSize/2) c.position.z = -chunkSize/2; });
        npcs.forEach(n => { n.position.z += n.userData.speed * n.userData.dir; if(Math.abs(n.position.z) > chunkSize/2) n.userData.dir *= -1; });

        let nextPos = character.position.clone();
        
        if(isFlying) {
            bodyGroup.rotation.x = THREE.MathUtils.lerp(bodyGroup.rotation.x, -Math.PI/2, 0.1);
            if(moveF) nextPos.y += 0.8; if(moveB) nextPos.y = Math.max(0, nextPos.y - 0.8);
            const flyDir = new THREE.Vector3(0,0,1.8).applyQuaternion(character.quaternion);
            nextPos.add(flyDir);
        } else {
            bodyGroup.rotation.x = THREE.MathUtils.lerp(bodyGroup.rotation.x, 0, 0.1);
            if(character.position.y > 0 || velocityY !== 0) { velocityY -= gravity; nextPos.y += velocityY; if(nextPos.y <= 0) { nextPos.y = 0; velocityY = 0; } }
            if(moveF || moveB) {
                let s = moveF ? 1.1 : -0.5;
                const walkDir = new THREE.Vector3(0,0,s).applyQuaternion(character.quaternion);
                nextPos.add(walkDir);
                walkCycle += 0.3;
                leftLeg.rotation.x = Math.sin(walkCycle) * 0.8; rightLeg.rotation.x = Math.sin(walkCycle + Math.PI) * 0.8;
            } else { leftLeg.rotation.x = rightLeg.rotation.x = 0; }
        }

        if(rotL) character.rotation.y += 0.06; if(rotR) character.rotation.y -= 0.06;

        // تطبيق التصادم: إذا لم يكن هناك تصادم، تحرك
        if (!checkCollision(nextPos)) {
            character.position.copy(nextPos);
        }

        const camTarget = new THREE.Vector3(0, 18, -45).applyMatrix4(character.matrixWorld);
        camera.position.lerp(camTarget, 0.1);
        camera.lookAt(character.position.x, character.position.y + 4, character.position.z);
        renderer.render(scene, camera);
    }

    function setupControls() {
        const bind = (id, s, e) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (ev) => { ev.preventDefault(); s(); });
            el.addEventListener('touchend', (ev) => { ev.preventDefault(); e(); });
        };
        bind('up', () => moveF = true, () => moveF = false);
        bind('down', () => moveB = true, () => moveB = false);
        bind('left', () => rotL = true, () => rotL = false);
        bind('right', () => rotR = true, () => rotR = false);
        document.getElementById('fly-toggle').onclick = function() { isFlying = !isFlying; };
        document.getElementById('jump').ontouchstart = (ev) => { if(!isFlying && character.position.y < 0.1) velocityY = 0.7; };
    }
    init();
</script>
</body>
</html>
